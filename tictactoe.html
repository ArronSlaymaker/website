<!DOCTYPE html>
<html>
  <head>
    <Title>Tic Tac Toe</Title>
    <link href="tictactoe.css"
  </head>
    <body>
      <h1>Play TicTacToe</h1>

	<div id='turn'>x's Turn></div>
   
	<table>
		var turn = "x";
$('td').on('click', function(){
var $square = $(this);
if($square.text() == ""){
$square.text(turn);
if(turn == "x"){
turn = "o";
}else{
turn = "x";
}
$('#turn').text(turn + "'s turn");
}
});
	</table>
	</body>
</html>
